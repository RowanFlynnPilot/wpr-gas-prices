name: Update Gas Prices

on:
  schedule:
    # Runs daily at 7:00 AM and 12:00 PM Central Time (CT = UTC-6, CDT = UTC-5)
    # Using UTC: 12:00 and 17:00 to cover CDT; adjust if needed
    - cron: '0 12 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI (the "Run workflow" button)

permissions:
  contents: write
  pages: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape_gas_prices.py --output docs/gas_prices.json

      - name: Commit and push updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add docs/gas_prices.json docs/gas_prices_history.json
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No price changes detected, skipping commit."
          else
            git commit -m "Update gas prices — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
