<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisconsin Gas Prices — Wausau Pilot &amp; Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap');

  :root {
    --ink: #1a1a1a; --ink-mid: #444; --ink-light: #6b6b6b; --ink-faint: #999;
    --paper: #f9fafb; --paper-warm: #f0f5f4;
    --rule: #c8d8d5; --rule-light: #dfe9e7;
    --accent: #3e847a; --accent-light: #5ab8ad; --accent-pale: #e0f2ef; --accent-dark: #2d6259;
    --up: #c0392b; --down: #27864a; --neutral: #888; --radius: 6px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  .wpr-gas { font-family:'DM Sans',-apple-system,sans-serif; background:var(--paper); color:var(--ink); max-width:720px; margin:0 auto; border:1px solid var(--rule); border-radius:var(--radius); overflow:hidden; line-height:1.45; }

  .wpr-gas-header { background:var(--ink); color:#fff; position:relative; }
  .wpr-gas-header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--accent),var(--accent-light)); }
  .wpr-gas-header-top { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; gap:12px; }
  .wpr-gas-header-left { display:flex; align-items:center; gap:12px; }
  .wpr-gas-logo { width:56px; height:56px; border-radius:50%; border:2px solid rgba(255,255,255,0.15); }
  .wpr-gas-kicker { font-size:9px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:var(--accent-light); }
  .wpr-gas-title { font-family:'Playfair Display',Georgia,serif; font-size:20px; font-weight:700; line-height:1.15; }
  .wpr-gas-date { font-size:11px; color:rgba(255,255,255,0.45); margin-top:5px; padding-left:4px; font-style:italic; }
  .wpr-gas-hero-price { text-align:right; min-width:130px; }
  .wpr-gas-hero-label { font-size:9px; text-transform:uppercase; letter-spacing:0.8px; color:rgba(255,255,255,0.5); }
  .wpr-gas-hero-value { font-family:'Playfair Display',Georgia,serif; font-size:38px; font-weight:700; line-height:1; }
  .wpr-gas-hero-change { font-size:11px; font-weight:600; margin-top:2px; }
  .wpr-gas-hero-change .up { color:#ff8a80; }
  .wpr-gas-hero-change .down { color:#81c995; }
  .wpr-gas-hero-change .flat { color:rgba(255,255,255,0.4); }
  .wpr-dollar { font-family:'Source Sans 3',sans-serif; font-weight:inherit; }

  .wpr-gas-tabs { display:flex; background:var(--paper-warm); border-bottom:1px solid var(--rule); }
  .wpr-gas-tab { flex:1; text-align:center; padding:10px 0; font-size:13px; font-weight:500; color:var(--ink-light); cursor:pointer; border:none; background:none; border-bottom:2.5px solid transparent; transition:all 0.15s; }
  .wpr-gas-tab:hover { color:var(--accent); }
  .wpr-gas-tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

  .wpr-gas-fuel-row { display:flex; flex-wrap:wrap; gap:6px; padding:12px 14px 8px; justify-content:center; }
  .wpr-gas-fuel-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; padding:6px 18px; border-radius:100px; border:1.5px solid var(--rule); background:#fff; color:var(--ink-mid); cursor:pointer; transition:all 0.18s; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .wpr-gas-fuel-btn:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 2px 6px rgba(62,132,122,0.15); transform:translateY(-1px); }
  .wpr-gas-fuel-btn.active { background:linear-gradient(135deg, var(--accent-dark), var(--accent)); color:#fff; border-color:var(--accent-dark); box-shadow:0 2px 8px rgba(62,132,122,0.3); }

  .wpr-state-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:12px 14px 16px; }
  .wpr-state-card { background:#fff; border:1px solid var(--rule-light); border-radius:var(--radius); padding:14px; text-align:center; }
  .wpr-state-card-label { font-size:9px; text-transform:uppercase; letter-spacing:0.6px; color:var(--ink-faint); margin-bottom:4px; font-weight:700; }
  .wpr-state-card-value { font-family:'Playfair Display',Georgia,serif; font-size:24px; font-weight:700; }
  .wpr-state-card-sub { font-size:10px; margin-top:2px; color:var(--ink-light); }
  .wpr-state-range { padding:0 14px 16px; }
  .wpr-state-range-bar { background:var(--rule-light); border-radius:10px; height:12px; position:relative; margin:8px 0 4px; }
  .wpr-state-range-fill { background:linear-gradient(90deg,var(--down),var(--accent),var(--up)); border-radius:10px; height:100%; position:absolute; left:0; width:100%; }
  .wpr-state-range-marker { position:absolute; top:-4px; width:3px; height:20px; background:var(--ink); border-radius:2px; transform:translateX(-50%); z-index:2; }
  .wpr-state-range-marker-city { position:absolute; top:50%; width:16px; height:16px; background:var(--accent); border:3px solid #fff; border-radius:50%; transform:translate(-50%, -50%); z-index:3; box-shadow:0 1px 4px rgba(0,0,0,0.35); }
  .wpr-state-range-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--ink-faint); }
  .wpr-state-city-select-wrap { padding:0 14px 14px; }
  .wpr-state-city-select { font-family:'DM Sans',sans-serif; font-size:12px; width:100%; padding:8px 12px; border:1.5px solid var(--rule); border-radius:var(--radius); background:#fff; color:var(--ink); cursor:pointer; appearance:auto; }
  .wpr-state-city-select:hover { border-color:var(--accent); }
  .wpr-state-city-select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-pale); }
  .wpr-state-city-label { font-size:10px; color:var(--ink-faint); text-align:center; margin-bottom:2px; }
  .wpr-state-card-city-dot { display:inline-block; width:10px; height:10px; background:var(--accent); border:2px solid #fff; border-radius:50%; box-shadow:0 0 0 1px var(--accent); vertical-align:middle; margin-right:4px; }

  .wpr-metro-list { padding:8px 14px 14px; }
  .wpr-metro-card { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border:1px solid var(--rule-light); border-radius:var(--radius); margin-bottom:6px; background:#fff; transition:all 0.12s; }
  .wpr-metro-card:hover { border-color:var(--accent); }
  .wpr-metro-card.highlight { background:var(--accent-pale); border-color:var(--accent); }
  .wpr-metro-name { font-size:13px; font-weight:600; }
  .wpr-metro-right { text-align:right; display:flex; align-items:center; gap:12px; }
  .wpr-metro-price { font-family:'Playfair Display',Georgia,serif; font-size:22px; font-weight:700; }
  .wpr-metro-range { font-size:10px; color:var(--ink-faint); }
  .wpr-metro-delta { font-size:11px; font-weight:600; min-width:55px; text-align:right; }
  .up-color { color:var(--up); } .down-color { color:var(--down); } .flat-color { color:var(--neutral); }

  /* Statewide comparison bars */
  .wpr-gas-compare { padding:8px 14px 16px; }
  .wpr-gas-compare-row { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:4px; transition:background 0.12s; }
  .wpr-gas-compare-row:hover { background:var(--paper-warm); }
  .wpr-gas-compare-row.active-fuel { background:var(--accent-pale); }
  .wpr-gas-compare-label { font-size:11px; font-weight:500; color:var(--ink-mid); min-width:72px; }
  .wpr-gas-compare-bar-wrap { flex:1; height:24px; background:var(--rule-light); border-radius:4px; overflow:hidden; position:relative; }
  .wpr-gas-compare-bar { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius:4px; transition:width 0.3s ease; }
  .wpr-gas-compare-row.active-fuel .wpr-gas-compare-bar { background:linear-gradient(90deg, var(--accent-dark), var(--accent)); }
  .wpr-gas-compare-price { font-family:'Playfair Display',Georgia,serif; font-size:14px; font-weight:700; min-width:58px; text-align:right; }
  .wpr-gas-compare-change { font-size:10px; font-weight:600; min-width:68px; text-align:right; }

  .wpr-trends-btn-row { justify-content:center; }
  .wpr-trends-btn-divider { display:inline-block; width:1px; height:20px; background:var(--rule); margin:0 4px; align-self:center; }
  .wpr-trends-title { font-family:'Playfair Display',Georgia,serif; font-size:16px; font-weight:700; color:var(--ink); text-align:center; padding:4px 0 12px; letter-spacing:-0.2px; }
  .wpr-trends-chart-wrap { padding:0 10px 10px; }
  .wpr-trends-stats { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; padding:8px 14px 12px; }
  .wpr-trends-stat { background:#fff; border:1px solid var(--rule-light); border-radius:var(--radius); padding:8px 12px; text-align:center; min-width:100px; flex:1; }
  .wpr-trends-stat-label { display:block; font-size:8px; text-transform:uppercase; letter-spacing:0.7px; color:var(--ink-faint); margin-bottom:3px; }
  .wpr-trends-stat-value { font-family:'Playfair Display',Georgia,serif; font-size:18px; font-weight:700; }
  .wpr-trends-svg { width:100%; height:auto; }
  .wpr-trends-empty { text-align:center; padding:40px 10px; color:var(--ink-faint); font-style:italic; font-size:13px; }
  .wpr-chart-axis-label { font-size:9px; fill:var(--ink-faint); font-family:'DM Sans',sans-serif; }
  .wpr-chart-hover-group .wpr-chart-crosshair, .wpr-chart-hover-group .wpr-chart-dot, .wpr-chart-hover-group .wpr-chart-tooltip { transition:opacity 0.12s; }
  .wpr-chart-hover-group:hover .wpr-chart-crosshair { opacity:0.5 !important; }
  .wpr-chart-hover-group:hover .wpr-chart-dot { opacity:1 !important; }
  .wpr-chart-hover-group:hover .wpr-chart-tooltip { opacity:1 !important; }

  .wpr-gas-footer { padding:8px 14px; border-top:1px solid var(--rule); display:flex; justify-content:space-between; align-items:center; font-size:10px; color:var(--ink-faint); background:var(--paper-warm); }
  .wpr-gas-footer a { color:var(--accent); text-decoration:none; font-weight:500; }
  .wpr-gas-footer a:hover { text-decoration:underline; }

  @media (max-width:520px) {
    .wpr-gas-hero-value { font-size:30px; }
    .wpr-state-grid { grid-template-columns:1fr; }
    .wpr-metro-price { font-size:18px; }
    .wpr-trends-stats { flex-direction:column; }
  }
</style>
</head>

  async function loadEIAData() {
    if (eiaAllData && !usingSampleData) return;
    try {
      const resp = await fetch(EIA_DATA_URL);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      eiaAllData = await resp.json();
      usingSampleData = false;
      eiaCache = {};
    } catch (err) {
      if (!eiaAllData) { eiaAllData = EIA_SAMPLE; usingSampleData = true; }
    }
  }

  function getEIAEntries(fuel) {
    if (eiaCache[fuel]) return eiaCache[fuel];
    const source = eiaAllData || EIA_SAMPLE;
    const raw = source[fuel];
    if (!raw || !raw.length) return null;
    const entries = raw.map(d => ({ date: new Date(d.date), price: d.price }));
    entries.sort((a, b) => a.date - b.date);
    eiaCache[fuel] = entries;
    return entries;
  }

  // ── Helpers ──
  function fmt(p) {
    if (p == null) return '—';
    return '<span class="wpr-dollar">$</span>' + p.toFixed(3);
  }
  function fmtHero(p) {
    if (p == null) return '—';
    return '<span class="wpr-dollar">$</span>' + p.toFixed(3);
  }
  function fuelLabel(k) {
    return { regular:'Regular', mid_grade:'Mid-Grade', premium:'Premium', diesel:'Diesel' }[k] || k;
  }
  function delta(c, p) {
    if (c == null || p == null) return { text: '—', cls: 'flat-color' };
    const diff = c - p;
    const sign = diff > 0 ? '+' : '';
    const cls = diff > 0.001 ? 'up-color' : diff < -0.001 ? 'down-color' : 'flat-color';
    const arrow = diff > 0.001 ? '▲' : diff < -0.001 ? '▼' : '—';
    return { text: `${arrow} ${sign}${diff.toFixed(3)}`, cls };
  }

  function getYesterdayPrice(key, fuel) {
    if (!historyData) return null;
    const keys = Object.keys(historyData).sort();
    const todayKey = data?.price_date;
    for (let i = keys.length - 1; i >= 0; i--) {
      if (keys[i] !== todayKey) {
        return historyData[keys[i]]?.[key]?.[fuel] ?? null;
      }
    }
    return null;
  }

  function findExtremeCities(fuel) {
    const metros = data?.metros || {};
    let lowCity = null, lowPrice = Infinity;
    let highCity = null, highPrice = -Infinity;
    for (const [name, m] of Object.entries(metros)) {
      const avg = m?.current_avg?.[fuel];
      if (avg != null) {
        if (avg < lowPrice) { lowPrice = avg; lowCity = name; }
        if (avg > highPrice) { highPrice = avg; highCity = name; }
      }
    }
    return {
      lowCity: lowPrice < Infinity ? lowCity : null,
      highCity: highPrice > -Infinity ? highCity : null,
    };
  }

      { key: 'week_ago_avg', label: 'Week Ago' },
      { key: 'month_ago_avg', label: 'Month Ago' },
      { key: 'year_ago_avg', label: 'Year Ago' },
    ];

    // Gather values for bar scaling
    let values = [];
    periods.forEach(p => {
      const val = sw?.[p.key]?.[activeFuel];
      if (val != null) values.push(val);
    });

    // If we only have current (no history), show the card layout instead
    if (values.length <= 1) {
      const avg = sw?.current_avg?.[activeFuel];
      const low = sw?.low?.[activeFuel];
      const high = sw?.high?.[activeFuel];
      const { lowCity, highCity } = findExtremeCities(activeFuel);

      // City comparison
      const metros = data?.metros || {};
      const cityNames = Object.keys(metros).sort();
      const cityPrice = selectedCity ? metros[selectedCity]?.current_avg?.[activeFuel] : null;

      let markerPct = 50;
      if (avg != null && low != null && high != null && high > low) {
        markerPct = ((avg - low) / (high - low)) * 100;
      }
      let cityMarkerPct = null;
      if (cityPrice != null && low != null && high != null && high > low) {
        cityMarkerPct = ((cityPrice - low) / (high - low)) * 100;
      }

      // Middle card shows city avg if selected, otherwise state avg
      const middleLabel = selectedCity ? `<span class="wpr-state-card-city-dot"></span>${selectedCity}` : 'State Avg';
      const middleValue = selectedCity ? cityPrice : avg;

      let cityOptions = cityNames.map(n =>
        `<option value="${n}" ${selectedCity === n ? 'selected' : ''}>${n}</option>`
      ).join('');

      return `
        <div class="wpr-gas-fuel-row">${fuelBtns}</div>
        <div class="wpr-state-grid">
          <div class="wpr-state-card">
            <div class="wpr-state-card-label">Lowest</div>
            <div class="wpr-state-card-value" style="color:var(--down)">${fmt(low)}</div>
            ${lowCity ? `<div class="wpr-state-card-sub">${lowCity}</div>` : ''}
          </div>
          <div class="wpr-state-card">
            <div class="wpr-state-card-label">${middleLabel}</div>
            <div class="wpr-state-card-value">${fmt(middleValue)}</div>
          </div>
          <div class="wpr-state-card">
            <div class="wpr-state-card-label">Highest</div>
            <div class="wpr-state-card-value" style="color:var(--up)">${fmt(high)}</div>
            ${highCity ? `<div class="wpr-state-card-sub">${highCity}</div>` : ''}
          </div>
        </div>
        <div class="wpr-state-range">
          <div class="wpr-state-range-bar">
            <div class="wpr-state-range-fill"></div>
            <div class="wpr-state-range-marker" style="left:${markerPct}%" title="State Average"></div>
            ${cityMarkerPct != null ? `<div class="wpr-state-range-marker-city" style="left:${cityMarkerPct}%" title="${selectedCity}: $${cityPrice.toFixed(3)}"></div>` : ''}
          </div>
          <div class="wpr-state-range-labels">
            <span>Low ${low != null ? '$' + low.toFixed(2) : '—'}</span>
            <span>State Avg ${avg != null ? '$' + avg.toFixed(3) : '—'}</span>
            <span>High ${high != null ? '$' + high.toFixed(2) : '—'}</span>
          </div>
        </div>
        <div class="wpr-state-city-select-wrap">
          <div class="wpr-state-city-label">Compare a city</div>
          <select class="wpr-state-city-select" id="citySelect">
            <option value="">State Average</option>
            ${cityOptions}
          </select>
        </div>
      `;
    }

    // Bar chart with time comparisons
    const maxPrice = Math.max(...values) * 1.08;
    const currentVal = sw?.current_avg?.[activeFuel];

    let rows = periods.map(p => {
      const val = sw?.[p.key]?.[activeFuel];
      if (val == null) return '';
      const pct = ((val / maxPrice) * 100).toFixed(1);
      const changeInfo = p.key !== 'current_avg' && currentVal != null
        ? delta(currentVal, val)
        : { text: '', cls: '' };
      const isCurrent = p.key === 'current_avg';

      return `
        <div class="wpr-gas-compare-row${isCurrent ? ' active-fuel' : ''}">
          <span class="wpr-gas-compare-label">${p.label}</span>
          <div class="wpr-gas-compare-bar-wrap">
            <div class="wpr-gas-compare-bar" style="width:${pct}%"></div>
          </div>
          <span class="wpr-gas-compare-price">${fmt(val)}</span>
          <span class="wpr-gas-compare-change ${changeInfo.cls}">${changeInfo.text}</span>
        </div>
      `;
    }).join('');

    return `
      <div class="wpr-gas-fuel-row">${fuelBtns}</div>
      <div class="wpr-gas-compare">${rows}</div>
    `;
  }

  // ── Metro Tab ──
  function renderMetro() {
    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    let fuelBtns = fuels.map(f =>
      `<button class="wpr-gas-fuel-btn ${activeFuel === f ? 'active' : ''}" data-fuel="${f}">${fuelLabel(f)}</button>`
    ).join('');

    const metros = data.metros || {};
    const priority = data.priority_metros || [];
    const allNames = [...priority, ...Object.keys(metros).filter(n => !priority.includes(n))];

    let cards = allNames.map(name => {
      const m = metros[name];
      if (!m) return '';
      const price = m.current_avg?.[activeFuel];
      const low = m.low?.[activeFuel];
      const high = m.high?.[activeFuel];
      const yest = getYesterdayPrice(name, activeFuel);
      const d = delta(price, yest);
      const isWausau = name === 'Wausau';
      const rangeText = (low != null && high != null) ? `$${low.toFixed(2)} – $${high.toFixed(2)}` : '';

      return `
        <div class="wpr-metro-card ${isWausau ? 'highlight' : ''}">
          <div>
            <div class="wpr-metro-name">${name}</div>
            <div class="wpr-metro-range">${rangeText}</div>
          </div>
          <div class="wpr-metro-right">
            <div class="wpr-metro-price">${fmt(price)}</div>
            <div class="wpr-metro-delta ${d.cls}">${yest != null ? d.text : ''}</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="wpr-gas-fuel-row">${fuelBtns}</div>
      <div class="wpr-metro-list">${cards}</div>
    `;
  }

  // ── Trends Tab ──
  function buildChart(entries) {
    // Limit to selected time range
    let cutoff = entries.length > trendRange ? entries.slice(-trendRange) : entries;

    // Trim to start at the first full month
    // (e.g. if range starts mid-October, skip to November 1st)
    if (cutoff.length > 2) {
      const firstDate = cutoff[0].date;
      const firstMonth = firstDate.getMonth();
      const firstYear = firstDate.getFullYear();
      // Find the first entry that's in the next month
      const nextMonthStart = cutoff.findIndex(e => {
        const m = e.date.getMonth();
        const y = e.date.getFullYear();
        return (y > firstYear) || (y === firstYear && m > firstMonth);
      });
      if (nextMonthStart > 0 && nextMonthStart < cutoff.length - 2) {
        cutoff = cutoff.slice(nextMonthStart);
      }
    }

    const prices = cutoff.map(e => e.price);
    const minP = Math.min(...prices);
    const maxP = Math.max(...prices);

    // Chart dimensions
    const W = 600, H = 280;
    const padL = 48, padR = 16, padT = 20, padB = 40;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    // Y-axis: only 4 ticks max for a cleaner look
    const niceMin = Math.floor(minP * 20) / 20;
    const niceMax = Math.ceil(maxP * 20) / 20;
    const niceRange = niceMax - niceMin || 0.05;
    const yTicks = [];
    const rawStep = niceRange / 3;
    const step = rawStep <= 0.05 ? 0.05 : rawStep <= 0.1 ? 0.1 : rawStep <= 0.25 ? 0.25 : 0.5;
    for (let v = niceMin; v <= niceMax + 0.001; v += step) {
      yTicks.push(v);
    }

    // Build points
    const points = cutoff.map((e, i) => {
      const x = padL + (i / (cutoff.length - 1)) * chartW;
      const y = padT + (1 - (e.price - niceMin) / niceRange) * chartH;
      return { x, y, price: e.price, date: e.date };
    });

    const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('');
    const areaPath = linePath + `L${points[points.length-1].x.toFixed(1)},${padT + chartH}L${points[0].x.toFixed(1)},${padT + chartH}Z`;

    // Grid + Y labels (horizontal lines only)
    let grid = '';
    for (const tick of yTicks) {
      const y = padT + (1 - (tick - niceMin) / niceRange) * chartH;
      grid += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#e8e5de" stroke-width="0.5"/>`;
      grid += `<text x="${padL - 6}" y="${y + 3.5}" text-anchor="end" class="wpr-chart-axis-label" style="font-family:'Source Sans 3',sans-serif">$${tick.toFixed(2)}</text>`;
    }

    // X-axis month labels (no vertical gridlines)
    let xLabels = '';
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let lastMonth = -1;
    for (const p of points) {
      const mo = p.date.getMonth();
      if (mo !== lastMonth) {
        lastMonth = mo;
        xLabels += `<text x="${p.x}" y="${H - 8}" text-anchor="middle" class="wpr-chart-axis-label">${months[mo]}</text>`;
      }
    }

    // Invisible hover hit areas + tooltip dots for each data point
    const months_full = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let hitAreas = '';
    const hitW = chartW / Math.max(cutoff.length - 1, 1);
    for (let i = 0; i < points.length; i++) {
      const p = points[i];
      const weekOf = `${months_full[p.date.getMonth()]} ${p.date.getDate()}, ${p.date.getFullYear()}`;
      hitAreas += `
        <g class="wpr-chart-hover-group" data-idx="${i}">
          <rect x="${p.x.toFixed(1) - hitW/2}" y="${padT}" width="${hitW}" height="${chartH}" fill="transparent" class="wpr-chart-hit"/>
          <line x1="${p.x.toFixed(1)}" y1="${padT}" x2="${p.x.toFixed(1)}" y2="${padT + chartH}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,3" class="wpr-chart-crosshair" opacity="0"/>
          <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="5" fill="var(--accent)" stroke="#fff" stroke-width="2" class="wpr-chart-dot" opacity="0"/>
          <g class="wpr-chart-tooltip" opacity="0" transform="translate(${p.x.toFixed(1)}, ${Math.max(p.y - 14, padT + 4).toFixed(1)})">
            <rect x="-42" y="-24" width="84" height="26" rx="4" fill="var(--ink)" opacity="0.9"/>
            <text x="0" y="-10" text-anchor="middle" fill="#fff" font-size="9" font-family="'Source Sans 3',sans-serif" font-weight="600">$${p.price.toFixed(3)}</text>
            <text x="0" y="-1" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="7" font-family="'DM Sans',sans-serif">${weekOf}</text>
          </g>
        </g>`;
    }

    // Summary stats
    const lastPt = points[points.length - 1];
    const firstPt = points[0];
    const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
    const totalChange = lastPt.price - firstPt.price;
    const changePct = ((totalChange / firstPt.price) * 100).toFixed(1);
    const changeSign = totalChange > 0 ? '+' : '';
    const changeColor = totalChange > 0 ? 'var(--up)' : totalChange < 0 ? 'var(--down)' : 'var(--neutral)';

    const rangeLabel = trendRange === 26 ? '6 Month' : '12 Month';

    return `
      <div class="wpr-trends-stats">
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">Latest</span>
          <span class="wpr-trends-stat-value"><span class="wpr-dollar">$</span>${lastPt.price.toFixed(3)}</span>
        </div>
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">${rangeLabel} Avg</span>
          <span class="wpr-trends-stat-value"><span class="wpr-dollar">$</span>${avg.toFixed(3)}</span>
        </div>
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">${rangeLabel} Low</span>
          <span class="wpr-trends-stat-value" style="color:var(--down)"><span class="wpr-dollar">$</span>${minP.toFixed(3)}</span>
        </div>
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">${rangeLabel} High</span>
          <span class="wpr-trends-stat-value" style="color:var(--up)"><span class="wpr-dollar">$</span>${maxP.toFixed(3)}</span>
        </div>
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">Overall Change</span>
          <span class="wpr-trends-stat-value" style="color:${changeColor}">${changeSign}${changePct}%</span>
        </div>
      </div>
      <svg viewBox="0 0 ${W} ${H}" class="wpr-trends-svg">
        ${grid}
        <path d="${areaPath}" fill="var(--accent-pale)" opacity="0.4"/>
        <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${lastPt.x}" cy="${lastPt.y}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="1.5"/>
        ${xLabels}
        ${hitAreas}
      </svg>
    `;
  }


  function renderTrends() {
    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    const ranges = [{ weeks: 26, label: '6 Month' }, { weeks: 52, label: '12 Month' }];

    let fuelBtns = fuels.map(f =>
      `<button class="wpr-gas-fuel-btn ${activeFuel === f ? 'active' : ''}" data-fuel="${f}">${fuelLabel(f)}</button>`
    ).join('');

    let rangeBtns = ranges.map(r =>
      `<button class="wpr-gas-fuel-btn ${trendRange === r.weeks ? 'active' : ''}" data-range="${r.weeks}">${r.label}</button>`
    ).join('');

    let chartContent = '';
    if (!eiaAllData || usingSampleData) {
      chartContent = '<div class="wpr-trends-empty">Loading historical data…</div>';
      loadEIAData().then(() => render());
    } else {
      const entries = getEIAEntries(activeFuel);
      if (!entries || entries.length < 2) {
        chartContent = '<div class="wpr-trends-empty">Not enough historical data available.</div>';
      } else {
        chartContent = buildChart(entries);
      }
    }

    const rangeLabel = ranges.find(r => r.weeks === trendRange)?.label || '6 Month';
    const fuelName = fuelLabel(activeFuel);

    return `
      <div class="wpr-gas-fuel-row wpr-trends-btn-row">
        ${fuelBtns}
        <span class="wpr-trends-btn-divider"></span>
        ${rangeBtns}
      </div>
      <div class="wpr-trends-chart-wrap">
        <div class="wpr-trends-title">Midwest Region · ${fuelName} · ${rangeLabel}</div>
        ${chartContent}
      </div>
    `;
  }

  // ── Init ──
  async function init() {
    try {
      const [dataResp, histResp] = await Promise.all([
        fetch(DATA_URL).then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(HISTORY_URL).then(r => r.ok ? r.json() : null).catch(() => null),
      ]);
      data = dataResp || FALLBACK_DATA;
      historyData = histResp;
      usingFallback = !dataResp;
    } catch (err) {
      data = FALLBACK_DATA;
      usingFallback = true;
    }
    render();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
