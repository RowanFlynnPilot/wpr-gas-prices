<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisconsin Gas Prices — Wausau Pilot &amp; Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap');

  :root {
    --ink: #1a1a1a;
    --ink-mid: #444;
    --ink-light: #6b6b6b;
    --ink-faint: #999;
    --paper: #fafaf7;
    --paper-warm: #f5f3ee;
    --rule: #d4d0c8;
    --rule-light: #e8e5de;
    --accent: #b8232a;
    --accent-dark: #8c1a1f;
    --up: #c0392b;
    --down: #27864a;
    --neutral: #888;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .wpr-gas-widget {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--ink);
    max-width: 680px;
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
    line-height: 1.5;
  }

  /* ── Header ── */
  .wpr-gas-header {
    background: var(--ink);
    color: #fff;
    padding: 20px 24px 18px;
    position: relative;
    overflow: hidden;
  }
  .wpr-gas-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }
  .wpr-gas-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }
  .wpr-gas-kicker {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2px;
  }
  .wpr-gas-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.3px;
  }
  .wpr-gas-date {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 6px;
    font-style: italic;
  }
  .wpr-gas-hero-price {
    text-align: right;
    flex-shrink: 0;
  }
  .wpr-gas-hero-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2px;
    text-align: right;
  }
  .wpr-gas-hero-value {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 38px;
    line-height: 1;
    color: #fff;
    letter-spacing: -1px;
  }
  .wpr-gas-hero-change {
    font-size: 11px;
    text-align: right;
    margin-top: 4px;
    font-weight: 500;
  }
  .wpr-gas-hero-change .up { color: #ff8a80; }
  .wpr-gas-hero-change .down { color: #81c995; }
  .wpr-gas-hero-change .flat { color: rgba(255,255,255,0.4); }

  /* ── Tabs ── */
  .wpr-gas-tabs {
    display: flex;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-warm);
    padding: 0 16px;
    gap: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .wpr-gas-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: var(--ink-light);
    background: none;
    border: none;
    padding: 10px 14px 9px;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    position: relative;
  }
  .wpr-gas-tab:hover { color: var(--ink); }
  .wpr-gas-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* ── State-wide fuel type pills ── */
  .wpr-gas-fuel-row {
    display: flex;
    gap: 6px;
    padding: 14px 20px 10px;
    flex-wrap: wrap;
  }
  .wpr-gas-fuel-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid var(--rule);
    background: #fff;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .wpr-gas-fuel-btn:hover { border-color: var(--ink-light); }
  .wpr-gas-fuel-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* ── Statewide comparison bars ── */
  .wpr-gas-compare {
    padding: 8px 20px 16px;
  }
  .wpr-gas-compare-row {
    display: flex;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--rule-light);
    gap: 8px;
  }
  .wpr-gas-compare-row:last-child { border-bottom: none; }
  .wpr-gas-compare-label {
    font-size: 12px;
    color: var(--ink-light);
    width: 80px;
    flex-shrink: 0;
  }
  .wpr-gas-compare-bar-wrap {
    flex: 1;
    height: 18px;
    background: var(--rule-light);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .wpr-gas-compare-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .wpr-gas-compare-price {
    font-size: 13px;
    font-weight: 600;
    width: 58px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .wpr-gas-compare-change {
    font-size: 11px;
    width: 52px;
    text-align: right;
    flex-shrink: 0;
    font-weight: 500;
  }

  /* ── Metro view ── */
  .wpr-gas-metro-section { padding: 0; }
  .wpr-gas-metro-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .wpr-gas-metro-card {
    padding: 14px 20px;
    border-bottom: 1px solid var(--rule-light);
    border-right: 1px solid var(--rule-light);
    cursor: pointer;
    transition: background 0.12s;
  }
  .wpr-gas-metro-card:hover { background: var(--paper-warm); }
  .wpr-gas-metro-card:nth-child(2n) { border-right: none; }
  .wpr-gas-metro-card.highlight {
    background: rgba(184,35,42,0.03);
  }
  .wpr-gas-metro-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .wpr-gas-metro-name .star {
    font-size: 9px;
    color: var(--accent);
  }
  .wpr-gas-metro-price {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 22px;
    color: var(--ink);
    line-height: 1.2;
  }
  .wpr-gas-metro-delta {
    font-size: 11px;
    font-weight: 500;
    margin-top: 1px;
  }

  /* ── Detail panel (when metro is clicked) ── */
  .wpr-gas-detail-panel {
    background: var(--paper-warm);
    border-top: 1px solid var(--rule);
    padding: 16px 20px;
    display: none;
    animation: slideDown 0.2s ease;
  }
  .wpr-gas-detail-panel.open { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .wpr-gas-detail-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 17px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wpr-gas-detail-close {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--ink-faint);
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 8px;
  }
  .wpr-gas-detail-close:hover { color: var(--ink); }
  .wpr-gas-detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .wpr-gas-detail-table th {
    text-align: left;
    font-weight: 600;
    padding: 6px 8px;
    border-bottom: 2px solid var(--rule);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-light);
  }
  .wpr-gas-detail-table td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--rule-light);
    font-variant-numeric: tabular-nums;
  }
  .wpr-gas-detail-table tr:last-child td { border-bottom: none; }
  .wpr-gas-detail-table td:first-child { color: var(--ink-light); }

  /* ── Footer ── */
  .wpr-gas-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--ink-faint);
    background: var(--paper-warm);
  }
  .wpr-gas-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .wpr-gas-footer a:hover { text-decoration: underline; }

  /* ── Utility ── */
  .up-color { color: var(--up); }
  .down-color { color: var(--down); }
  .flat-color { color: var(--neutral); }
  .bar-current { background: var(--ink); }
  .bar-yesterday { background: #555; }
  .bar-week { background: #888; }
  .bar-month { background: #b8b4ac; }
  .bar-year { background: #d4d0c8; }

  .wpr-gas-loading {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-faint);
    font-size: 13px;
  }
  .wpr-gas-error {
    text-align: center;
    padding: 32px 20px;
    color: var(--accent);
    font-size: 13px;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .wpr-gas-hero-value { font-size: 30px; }
    .wpr-gas-title { font-size: 18px; }
    .wpr-gas-metro-grid { grid-template-columns: 1fr; }
    .wpr-gas-metro-card { border-right: none; }
    .wpr-gas-compare-label { width: 65px; font-size: 11px; }
    .wpr-gas-header { padding: 16px 16px 14px; }
    .wpr-gas-fuel-row { padding: 12px 16px 8px; }
    .wpr-gas-compare { padding: 8px 16px 14px; }
  }
</style>
</head>

  function fmt(price) {
    if (price == null) return '—';

  function delta(current, previous) {
    if (current == null || previous == null) return { text: '—', cls: 'flat-color' };

    const sign = diff > 0 ? '+' : '';

      </div>
    `;

    if (activeTab === 'statewide') {
      html += renderStatewide();
    } else {
      html += renderMetros();
    }

    html += `
      <div class="wpr-gas-footer">
        <span>Data via <a href="${data.source_url}" target="_blank" rel="noopener">AAA Gas Prices</a>${usingFallback ? ' · <em style="color:var(--accent)">sample data</em>' : ''}</span>
        <span>Wausau Pilot &amp; Review</span>
      </div>
    `;

    widget.innerHTML = html;
    bindEvents();
  }

  function renderStatewide() {
    const sw = data.statewide;
    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    const periods = ['current_avg', 'yesterday_avg', 'week_ago_avg', 'month_ago_avg', 'year_ago_avg'];
    const barCls = ['bar-current', 'bar-yesterday', 'bar-week', 'bar-month', 'bar-year'];

    // Find max price for bar scaling
    let maxPrice = 0;
    periods.forEach(p => {
      const val = sw[p]?.[activeFuel];
      if (val && val > maxPrice) maxPrice = val;
    });
    maxPrice *= 1.08; // breathing room

    let rows = '';
    periods.forEach((p, i) => {
      const price = sw[p]?.[activeFuel];
      const pct = price ? ((price / maxPrice) * 100).toFixed(1) : 0;
      const label = periodLabel(p);
      const changeInfo = i > 0 ? delta(sw.current_avg?.[activeFuel], price) : { text: '', cls: '' };
      
      rows += `
        <div class="wpr-gas-compare-row">
          <span class="wpr-gas-compare-label">${label}</span>
          <div class="wpr-gas-compare-bar-wrap">
            <div class="wpr-gas-compare-bar ${barCls[i]}" style="width:${pct}%"></div>
          </div>
          <span class="wpr-gas-compare-price">${fmt(price)}</span>
          <span class="wpr-gas-compare-change ${changeInfo.cls}">${i > 0 ? changeInfo.text : ''}</span>
        </div>
      `;
    });

    let fuelBtns = fuels.map(f =>
      `<button class="wpr-gas-fuel-btn ${activeFuel === f ? 'active' : ''}" data-fuel="${f}">${fuelLabel(f)}</button>`
    ).join('');

    return `
      <div class="wpr-gas-fuel-row">${fuelBtns}</div>
      <div class="wpr-gas-compare">${rows}</div>
    `;
  }

  function renderMetros() {
    const metros = data.metros || {};
    const priority = data.priority_metros || [];

    // Sort: priority first, then alphabetical
    const sortedNames = Object.keys(metros).sort((a, b) => {
      const aP = priority.indexOf(a);
      const bP = priority.indexOf(b);
      if (aP !== -1 && bP !== -1) return aP - bP;
      if (aP !== -1) return -1;
      if (bP !== -1) return 1;
      return a.localeCompare(b);
    });

    let cards = '';
    for (const name of sortedNames) {
      const m = metros[name];
      const price = m.current_avg?.[activeFuel];
      const yest = m.yesterday_avg?.[activeFuel];
      const d = delta(price, yest);
      const isPriority = priority.includes(name);
      const isWausau = name === 'Wausau';

      cards += `
        <div class="wpr-gas-metro-card ${isPriority ? 'highlight' : ''}" data-metro="${name}">
          <div class="wpr-gas-metro-name">
            ${isWausau ? '<span class="star">●</span>' : ''}${name}
          </div>
          <div class="wpr-gas-metro-price">${fmt(price)}</div>
          <div class="wpr-gas-metro-delta ${d.cls}">${d.text}</div>
        </div>
      `;
    }

    // Fuel filter
    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    let fuelBtns = fuels.map(f =>
      `<button class="wpr-gas-fuel-btn ${activeFuel === f ? 'active' : ''}" data-fuel="${f}">${fuelLabel(f)}</button>`
    ).join('');

    let detailPanel = '';
    if (selectedMetro && metros[selectedMetro]) {
      detailPanel = renderDetail(selectedMetro, metros[selectedMetro]);
    }

    return `
      <div class="wpr-gas-fuel-row">${fuelBtns}</div>
      <div class="wpr-gas-metro-section">
        <div class="wpr-gas-metro-grid">${cards}</div>
        ${detailPanel}
      </div>
    `;
  }

  function renderDetail(name, metro) {
    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    const periods = ['current_avg', 'yesterday_avg', 'week_ago_avg', 'month_ago_avg', 'year_ago_avg'];

    let headerCells = fuels.map(f => `<th>${fuelLabel(f)}</th>`).join('');
    let rows = periods.map(p => {
      let cells = fuels.map(f => {
        const val = metro[p]?.[f];
        return `<td>${fmt(val)}</td>`;
      }).join('');
      return `<tr><td>${periodLabel(p)}</td>${cells}</tr>`;
    }).join('');

    return `
      <div class="wpr-gas-detail-panel open">
        <div class="wpr-gas-detail-title">
          <span>${name}</span>
          <button class="wpr-gas-detail-close" data-action="close-detail">Close ✕</button>
        </div>
        <table class="wpr-gas-detail-table">
          <thead><tr><th></th>${headerCells}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  // ── EVENTS ──
  function bindEvents() {
    widget.querySelectorAll('.wpr-gas-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        selectedMetro = null;
        render();
      });
    });

    widget.querySelectorAll('.wpr-gas-fuel-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFuel = btn.dataset.fuel;
        render();
      });
    });

    widget.querySelectorAll('.wpr-gas-metro-card').forEach(card => {
      card.addEventListener('click', () => {
        const name = card.dataset.metro;
        selectedMetro = selectedMetro === name ? null : name;
        render();
      });
    });

    const closeBtn = widget.querySelector('[data-action="close-detail"]');
    if (closeBtn) {
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedMetro = null;
        render();
      });
    }
  }

  // ── INIT ──
  async function init() {
    // Try fetching live data first; fall back to embedded sample data
    try {
      const resp = await fetch(DATA_URL);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
      usingFallback = false;
    } catch (err) {
      console.warn('Gas widget: live data unavailable, using fallback.', err.message);
      data = FALLBACK_DATA;
      usingFallback = true;
    }
    render();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
