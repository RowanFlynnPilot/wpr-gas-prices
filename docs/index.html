<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisconsin Gas Prices — Wausau Pilot &amp; Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap');

  :root {
    --ink: #1a1a1a;
    --ink-mid: #444;
    --ink-light: #6b6b6b;
    --ink-faint: #999;
    --paper: #f9fafb;
    --paper-warm: #f0f5f4;
    --rule: #c8d8d5;
    --rule-light: #dfe9e7;
    --accent: #3e847a;
    --accent-light: #5ab8ad;
    --accent-pale: #e0f2ef;
    --accent-dark: #2d6259;
    --up: #c0392b;
    --down: #27864a;
    --neutral: #888;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .wpr-gas-widget {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--ink);
    max-width: 680px;
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
    line-height: 1.5;
  }

  /* ── Header ── */
  .wpr-gas-header {
    background: var(--ink);
    color: #fff;
    padding: 18px 24px 16px;
    position: relative;
    overflow: hidden;
  }
  .wpr-gas-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
  }
  .wpr-gas-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }
  .wpr-gas-header-left {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .wpr-gas-logo {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.15);
  }
  .wpr-gas-kicker {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 2px;
  }
  .wpr-gas-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.3px;
  }
  .wpr-gas-date {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 5px;
    font-style: italic;
  }
  .wpr-gas-hero-price {
    text-align: right;
    flex-shrink: 0;
  }
  .wpr-gas-hero-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2px;
    text-align: right;
  }
  .wpr-gas-hero-value {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 38px;
    line-height: 1;
    color: #fff;
    letter-spacing: -1px;
    font-weight: 700;
  }
  .wpr-gas-dollar {
    font-size: 1em;
    vertical-align: baseline;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    letter-spacing: 0;
    margin-right: 1px;
  }
  .wpr-dollar {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: inherit;
  }
  .wpr-gas-hero-change {
    font-size: 11px;
    text-align: right;
    margin-top: 4px;
    font-weight: 500;
  }
  .wpr-gas-hero-change .up { color: #ff8a80; }
  .wpr-gas-hero-change .down { color: #81c995; }
  .wpr-gas-hero-change .flat { color: rgba(255,255,255,0.4); }

  /* ── Tabs ── */
  .wpr-gas-tabs {
    display: flex;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-warm);
    padding: 0 16px;
    gap: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .wpr-gas-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: var(--ink-light);
    background: none;
    border: none;
    padding: 12px 28px 11px;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    position: relative;
  }
  .wpr-gas-tab:hover { color: var(--ink); }
  .wpr-gas-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* ── Fuel type pills ── */
  .wpr-gas-fuel-row {
    display: flex;
    gap: 6px;
    padding: 14px 20px 10px;
    flex-wrap: wrap;
  }
  .wpr-gas-fuel-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 0;
    border-radius: 100px;
    border: 1px solid var(--rule);
    background: #fff;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    text-align: center;
    min-width: 0;
  }
  .wpr-gas-fuel-btn:hover { border-color: var(--accent); color: var(--accent); }
  .wpr-gas-fuel-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── Statewide comparison bars ── */
  .wpr-gas-compare {
    padding: 8px 20px 16px;
  }
  .wpr-gas-compare-row {
    display: flex;
    align-items: center;
    padding: 9px 12px;
    border-bottom: 1px solid var(--rule-light);
    gap: 8px;
    border-radius: 8px;
    margin: 2px -12px;
    transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }
  .wpr-gas-compare-row:hover {
    background: var(--paper-warm);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(62,132,122,0.08);
  }
  .wpr-gas-compare-row:last-child { border-bottom: none; }
  .wpr-gas-compare-label {
    font-size: 12px;
    color: var(--ink-light);
    width: 80px;
    flex-shrink: 0;
  }
  .wpr-gas-compare-bar-wrap {
    flex: 1;
    height: 24px;
    background: var(--rule-light);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .wpr-gas-compare-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .wpr-gas-compare-price {
    font-size: 13px;
    font-weight: 600;
    width: 58px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .wpr-gas-compare-change {
    font-size: 11px;
    width: 52px;
    text-align: right;
    flex-shrink: 0;
    font-weight: 500;
  }

  /* ── Metro view ── */
  .wpr-gas-metro-section { padding: 0; }
  .wpr-gas-metro-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px 16px;
  }
  .wpr-gas-metro-card {
    padding: 16px 18px;
    border: 1px solid var(--rule-light);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s ease;
    background: #fff;
    text-align: center;
  }
  .wpr-gas-metro-card:hover {
    background: var(--paper-warm);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(62,132,122,0.1);
  }
  .wpr-gas-metro-card.highlight {
    background: var(--accent-pale);
    border-color: var(--accent-light);
  }
  .wpr-gas-metro-card.highlight:hover {
    background: #d0ece8;
  }
  .wpr-gas-metro-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .wpr-gas-metro-name .star {
    font-size: 10px;
    color: var(--accent);
  }
  .wpr-gas-metro-price {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 30px;
    color: var(--ink);
    line-height: 1.15;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .wpr-gas-metro-delta {
    font-size: 12px;
    font-weight: 600;
    margin-top: 4px;
  }

  /* ── Detail panel ── */
  .wpr-gas-detail-panel {
    background: var(--paper-warm);
    border-top: 1px solid var(--rule);
    padding: 16px 20px;
    display: none;
    animation: slideDown 0.2s ease;
  }
  .wpr-gas-detail-panel.open { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .wpr-gas-detail-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 17px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wpr-gas-detail-close {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--ink-faint);
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 8px;
  }
  .wpr-gas-detail-close:hover { color: var(--ink); }
  .wpr-gas-detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .wpr-gas-detail-table th {
    text-align: left;
    font-weight: 600;
    padding: 6px 8px;
    border-bottom: 2px solid var(--accent);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent-dark);
  }
  .wpr-gas-detail-table td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--rule-light);
    font-variant-numeric: tabular-nums;
  }
  .wpr-gas-detail-table tr:last-child td { border-bottom: none; }
  .wpr-gas-detail-table td:first-child { color: var(--ink-light); }

  /* ── Footer ── */
  .wpr-gas-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--ink-faint);
    background: var(--paper-warm);
  }
  .wpr-gas-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .wpr-gas-footer a:hover { text-decoration: underline; }

  /* ── Utility ── */
  .up-color { color: var(--up); }
  .down-color { color: var(--down); }
  .flat-color { color: var(--neutral); }
  .bar-current { background: var(--accent); }
  .bar-yesterday { background: var(--accent-light); }
  .bar-week { background: #8ecdc5; }
  .bar-month { background: #b8ddd8; }
  .bar-year { background: var(--rule); }

  /* ── Trends view ── */
  .wpr-trends-chart-wrap {
    padding: 0 20px 16px;
  }
  .wpr-trends-btn-row {
    gap: 4px;
  }
  .wpr-trends-btn-divider {
    width: 1px;
    height: 28px;
    background: var(--rule);
    align-self: center;
    margin: 0 8px;
    flex-shrink: 0;
  }
  .wpr-trends-svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .wpr-chart-axis-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    fill: var(--ink-faint);
  }
  .wpr-chart-hit { cursor: crosshair; }
  .wpr-chart-hover-group:hover .wpr-chart-crosshair,
  .wpr-chart-hover-group:hover .wpr-chart-dot,
  .wpr-chart-hover-group:hover .wpr-chart-tooltip {
    opacity: 1 !important;
  }
  .wpr-trends-stats {
    display: flex;
    gap: 0;
    padding: 0 0 12px;
    flex-wrap: wrap;
    border: 1px solid var(--rule);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .wpr-trends-stat {
    flex: 1;
    min-width: 90px;
    text-align: center;
    padding: 14px 6px;
    border-right: 1px solid var(--rule);
    background: #fff;
  }
  .wpr-trends-stat:last-child { border-right: none; }
  .wpr-trends-divider {
    width: 1px;
    height: 20px;
    background: var(--rule);
    align-self: center;
    margin: 0 6px;
    flex: none;
  }
  .wpr-trends-stat-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }
  .wpr-trends-stat-value {
    display: block;
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .wpr-trends-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-faint);
    font-size: 13px;
    font-style: italic;
  }
  .wpr-trends-loading-msg {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .wpr-gas-loading {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-faint);
    font-size: 13px;
  }
  .wpr-gas-error {
    text-align: center;
    padding: 32px 20px;
    color: var(--up);
    font-size: 13px;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .wpr-gas-hero-value { font-size: 30px; }
    .wpr-gas-title { font-size: 18px; }
    .wpr-gas-logo { width: 52px; height: 52px; }
    .wpr-gas-metro-grid { grid-template-columns: 1fr; padding: 8px 12px; }
    .wpr-gas-metro-card { padding: 14px 16px; }
    .wpr-gas-compare-label { width: 65px; font-size: 11px; }
    .wpr-gas-header { padding: 14px 16px 14px; }
    .wpr-gas-fuel-row { padding: 12px 16px 8px; }
    .wpr-gas-compare { padding: 8px 16px 14px; }
  }
</style>
</head>
<body>

<div class="wpr-gas-widget" id="gasWidget">
  <div class="wpr-gas-loading">Loading Wisconsin gas prices…</div>
</div>

  // ── HELPERS ──
  function fmt(price) {
    if (price == null) return '—';
    return '<span class="wpr-dollar">$</span>' + price.toFixed(3);
  }

  function fmtHero(price) {
    if (price == null) return '—';
    return '<span class="wpr-gas-dollar">$</span>' + price.toFixed(3);
  }

  function delta(current, previous) {
    if (current == null || previous == null) return { text: '—', cls: 'flat-color' };
    const diff = current - previous;
    const sign = diff > 0 ? '+' : '';
    const cls = diff > 0.001 ? 'up-color' : diff < -0.001 ? 'down-color' : 'flat-color';
    const arrow = diff > 0.001 ? '▲' : diff < -0.001 ? '▼' : '—';
    return { text: `${arrow} ${sign}${diff.toFixed(3)}`, cls };
  }

  function fuelLabel(key) {
    return { regular: 'Regular', mid_grade: 'Mid-Grade', premium: 'Premium', diesel: 'Diesel' }[key] || key;
  }

  function periodLabel(key) {
    return {
      current_avg: 'Today',
      yesterday_avg: 'Yesterday',
      week_ago_avg: 'Week Ago',
      month_ago_avg: 'Month Ago',
      year_ago_avg: 'Year Ago'
    }[key] || key;
  }

  function renderStatewide() {
    const sw = data.statewide;
    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    const periods = ['current_avg', 'yesterday_avg', 'week_ago_avg', 'month_ago_avg', 'year_ago_avg'];
    const barCls = ['bar-current', 'bar-yesterday', 'bar-week', 'bar-month', 'bar-year'];

    let maxPrice = 0;
    periods.forEach(p => {
      const val = sw[p]?.[activeFuel];
      if (val && val > maxPrice) maxPrice = val;
    });
    maxPrice *= 1.08;

    let rows = '';
    periods.forEach((p, i) => {
      const price = sw[p]?.[activeFuel];
      const pct = price ? ((price / maxPrice) * 100).toFixed(1) : 0;
      const label = periodLabel(p);
      const changeInfo = i > 0 ? delta(sw.current_avg?.[activeFuel], price) : { text: '', cls: '' };
      
      rows += `
        <div class="wpr-gas-compare-row">
          <span class="wpr-gas-compare-label">${label}</span>
          <div class="wpr-gas-compare-bar-wrap">
            <div class="wpr-gas-compare-bar ${barCls[i]}" style="width:${pct}%"></div>
          </div>
          <span class="wpr-gas-compare-price">${fmt(price)}</span>
          <span class="wpr-gas-compare-change ${changeInfo.cls}">${i > 0 ? changeInfo.text : ''}</span>
        </div>
      `;
    });

    let fuelBtns = fuels.map(f =>
      `<button class="wpr-gas-fuel-btn ${activeFuel === f ? 'active' : ''}" data-fuel="${f}">${fuelLabel(f)}</button>`
    ).join('');

    return `
      <div class="wpr-gas-fuel-row">${fuelBtns}</div>
      <div class="wpr-gas-compare">${rows}</div>
    `;
  }

  function renderMetros() {
    const metros = data.metros || {};
    const priority = data.priority_metros || [];

    const sortedNames = Object.keys(metros).sort((a, b) => {
      const aP = priority.indexOf(a);
      const bP = priority.indexOf(b);
      if (aP !== -1 && bP !== -1) return aP - bP;
      if (aP !== -1) return -1;
      if (bP !== -1) return 1;
      return a.localeCompare(b);
    });

    let cards = '';
    for (const name of sortedNames) {
      const m = metros[name];
      const price = m.current_avg?.[activeFuel];
      const yest = m.yesterday_avg?.[activeFuel];
      const d = delta(price, yest);
      const isPriority = priority.includes(name);
      const isWausau = name === 'Wausau';

      cards += `
        <div class="wpr-gas-metro-card ${isPriority ? 'highlight' : ''}" data-metro="${name}">
          <div class="wpr-gas-metro-name">
            ${name}
          </div>
          <div class="wpr-gas-metro-price">${fmt(price)}</div>
          <div class="wpr-gas-metro-delta ${d.cls}">${d.text}</div>
        </div>
      `;
    }

    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    let fuelBtns = fuels.map(f =>
      `<button class="wpr-gas-fuel-btn ${activeFuel === f ? 'active' : ''}" data-fuel="${f}">${fuelLabel(f)}</button>`
    ).join('');

    let detailPanel = '';
    if (selectedMetro && metros[selectedMetro]) {

      <div class="wpr-gas-metro-section">
        <div class="wpr-gas-metro-grid">${cards}</div>
        ${detailPanel}

    `;
  }

  async function loadEIAData() {
    if (eiaAllData) return;
    try {
      const resp = await fetch(EIA_DATA_URL);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      eiaAllData = await resp.json();
      usingSampleData = false;
    } catch (err) {
      console.warn('EIA file not available, using sample data:', err.message);
      eiaAllData = EIA_SAMPLE;
      usingSampleData = true;
    }
  }

  function getEIAEntries(fuel) {
    if (eiaCache[fuel]) return eiaCache[fuel];
    const source = eiaAllData || EIA_SAMPLE;
    const raw = source[fuel];
    if (!raw || !raw.length) return null;
    const entries = raw.map(d => ({ date: new Date(d.date), price: d.price }));
    entries.sort((a, b) => a.date - b.date);
    eiaCache[fuel] = entries;
    return entries;
  }

  function renderTrends() {
    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    const ranges = [
      { weeks: 26, label: '6 Month' },
      { weeks: 52, label: '12 Month' },
    ];

    let fuelBtns = fuels.map(f =>
      `<button class="wpr-gas-fuel-btn ${activeFuel === f ? 'active' : ''}" data-fuel="${f}">${fuelLabel(f)}</button>`
    ).join('');

    let rangeBtns = ranges.map(r =>
      `<button class="wpr-gas-fuel-btn ${trendRange === r.weeks ? 'active' : ''}" data-range="${r.weeks}">${r.label}</button>`
    ).join('');

    // Check if we have data loaded
    const entries = getEIAEntries(activeFuel);
    let chartContent = '';

    if (!eiaAllData && !usingSampleData) {
      chartContent = `<div class="wpr-trends-empty wpr-trends-loading-msg">Loading historical data…</div>`;
      // Trigger async load
      loadEIAData().then(() => render());
    } else if (!entries || entries.length < 2) {
      chartContent = `<div class="wpr-trends-empty">Not enough historical data available.</div>`;
    } else {
      chartContent = buildChart(entries);
    }

    const rangeLabel = ranges.find(r => r.weeks === trendRange)?.label || '6 Month';

    return `
      <div class="wpr-gas-fuel-row wpr-trends-btn-row">
        ${fuelBtns}
        <span class="wpr-trends-btn-divider"></span>
        ${rangeBtns}
      </div>
      <div class="wpr-trends-chart-wrap">
        ${chartContent}
      </div>
    `;
  }

  function buildChart(entries) {
    // Limit to selected time range
    let cutoff = entries.length > trendRange ? entries.slice(-trendRange) : entries;

    // Trim to start at the first full month
    // (e.g. if range starts mid-October, skip to November 1st)
    if (cutoff.length > 2) {
      const firstDate = cutoff[0].date;
      const firstMonth = firstDate.getMonth();
      const firstYear = firstDate.getFullYear();
      // Find the first entry that's in the next month
      const nextMonthStart = cutoff.findIndex(e => {
        const m = e.date.getMonth();
        const y = e.date.getFullYear();
        return (y > firstYear) || (y === firstYear && m > firstMonth);
      });
      if (nextMonthStart > 0 && nextMonthStart < cutoff.length - 2) {
        cutoff = cutoff.slice(nextMonthStart);
      }
    }

    const prices = cutoff.map(e => e.price);
    const minP = Math.min(...prices);
    const maxP = Math.max(...prices);

    // Chart dimensions
    const W = 600, H = 280;
    const padL = 48, padR = 16, padT = 20, padB = 40;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    // Y-axis: only 4 ticks max for a cleaner look
    const niceMin = Math.floor(minP * 20) / 20;
    const niceMax = Math.ceil(maxP * 20) / 20;
    const niceRange = niceMax - niceMin || 0.05;
    const yTicks = [];
    const rawStep = niceRange / 3;
    const step = rawStep <= 0.05 ? 0.05 : rawStep <= 0.1 ? 0.1 : rawStep <= 0.25 ? 0.25 : 0.5;
    for (let v = niceMin; v <= niceMax + 0.001; v += step) {
      yTicks.push(v);
    }

    // Build points
    const points = cutoff.map((e, i) => {
      const x = padL + (i / (cutoff.length - 1)) * chartW;
      const y = padT + (1 - (e.price - niceMin) / niceRange) * chartH;
      return { x, y, price: e.price, date: e.date };
    });

    const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('');
    const areaPath = linePath + `L${points[points.length-1].x.toFixed(1)},${padT + chartH}L${points[0].x.toFixed(1)},${padT + chartH}Z`;

    // Grid + Y labels (horizontal lines only)
    let grid = '';
    for (const tick of yTicks) {
      const y = padT + (1 - (tick - niceMin) / niceRange) * chartH;
      grid += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#e8e5de" stroke-width="0.5"/>`;
      grid += `<text x="${padL - 6}" y="${y + 3.5}" text-anchor="end" class="wpr-chart-axis-label" style="font-family:'Source Sans 3',sans-serif">$${tick.toFixed(2)}</text>`;
    }

    // X-axis month labels (no vertical gridlines)
    let xLabels = '';
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let lastMonth = -1;
    for (const p of points) {
      const mo = p.date.getMonth();
      if (mo !== lastMonth) {
        lastMonth = mo;
        xLabels += `<text x="${p.x}" y="${H - 8}" text-anchor="middle" class="wpr-chart-axis-label">${months[mo]}</text>`;
      }
    }

    // Invisible hover hit areas + tooltip dots for each data point
    const months_full = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let hitAreas = '';
    const hitW = chartW / Math.max(cutoff.length - 1, 1);
    for (let i = 0; i < points.length; i++) {
      const p = points[i];
      const weekOf = `${months_full[p.date.getMonth()]} ${p.date.getDate()}, ${p.date.getFullYear()}`;
      hitAreas += `
        <g class="wpr-chart-hover-group" data-idx="${i}">
          <rect x="${p.x.toFixed(1) - hitW/2}" y="${padT}" width="${hitW}" height="${chartH}" fill="transparent" class="wpr-chart-hit"/>
          <line x1="${p.x.toFixed(1)}" y1="${padT}" x2="${p.x.toFixed(1)}" y2="${padT + chartH}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,3" class="wpr-chart-crosshair" opacity="0"/>
          <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="5" fill="var(--accent)" stroke="#fff" stroke-width="2" class="wpr-chart-dot" opacity="0"/>
          <g class="wpr-chart-tooltip" opacity="0" transform="translate(${p.x.toFixed(1)}, ${Math.max(p.y - 14, padT + 4).toFixed(1)})">
            <rect x="-42" y="-24" width="84" height="26" rx="4" fill="var(--ink)" opacity="0.9"/>
            <text x="0" y="-10" text-anchor="middle" fill="#fff" font-size="9" font-family="'Source Sans 3',sans-serif" font-weight="600">$${p.price.toFixed(3)}</text>
            <text x="0" y="-1" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="7" font-family="'DM Sans',sans-serif">${weekOf}</text>
          </g>
        </g>`;
    }

    // Summary stats
    const lastPt = points[points.length - 1];
    const firstPt = points[0];
    const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
    const totalChange = lastPt.price - firstPt.price;
    const changePct = ((totalChange / firstPt.price) * 100).toFixed(1);
    const changeSign = totalChange > 0 ? '+' : '';
    const changeColor = totalChange > 0 ? 'var(--up)' : totalChange < 0 ? 'var(--down)' : 'var(--neutral)';

    const rangeLabel = trendRange === 26 ? '6 Month' : '12 Month';

    return `
      <div class="wpr-trends-stats">
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">Latest</span>
          <span class="wpr-trends-stat-value"><span class="wpr-dollar">$</span>${lastPt.price.toFixed(3)}</span>
        </div>
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">${rangeLabel} Avg</span>
          <span class="wpr-trends-stat-value"><span class="wpr-dollar">$</span>${avg.toFixed(3)}</span>
        </div>
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">${rangeLabel} Low</span>
          <span class="wpr-trends-stat-value" style="color:var(--down)"><span class="wpr-dollar">$</span>${minP.toFixed(3)}</span>
        </div>
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">${rangeLabel} High</span>
          <span class="wpr-trends-stat-value" style="color:var(--up)"><span class="wpr-dollar">$</span>${maxP.toFixed(3)}</span>
        </div>
        <div class="wpr-trends-stat">
          <span class="wpr-trends-stat-label">Overall Change</span>
          <span class="wpr-trends-stat-value" style="color:${changeColor}">${changeSign}${changePct}%</span>
        </div>
      </div>
      <svg viewBox="0 0 ${W} ${H}" class="wpr-trends-svg">
        ${grid}
        <path d="${areaPath}" fill="var(--accent-pale)" opacity="0.4"/>
        <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${lastPt.x}" cy="${lastPt.y}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="1.5"/>
        ${xLabels}
        ${hitAreas}
      </svg>
    `;
  }

  function renderDetail(name, metro) {
    const fuels = ['regular', 'mid_grade', 'premium', 'diesel'];
    const periods = ['current_avg', 'yesterday_avg', 'week_ago_avg', 'month_ago_avg', 'year_ago_avg'];

    let headerCells = fuels.map(f => `<th>${fuelLabel(f)}</th>`).join('');
    let rows = periods.map(p => {
      let cells = fuels.map(f => {
        const val = metro[p]?.[f];
        return `<td>${fmt(val)}</td>`;
      }).join('');
      return `<tr><td>${periodLabel(p)}</td>${cells}</tr>`;
    }).join('');

    return `
      <div class="wpr-gas-detail-panel open">
        <div class="wpr-gas-detail-title">
          <span>${name}</span>
          <button class="wpr-gas-detail-close" data-action="close-detail">Close ✕</button>
        </div>
        <table class="wpr-gas-detail-table">
          <thead><tr><th></th>${headerCells}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  // ── EVENTS ──
  function bindEvents() {
    widget.querySelectorAll('.wpr-gas-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        selectedMetro = null;
        render();
      });
    });

    widget.querySelectorAll('.wpr-gas-fuel-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.fuel) {
          activeFuel = btn.dataset.fuel;
          render();
        } else if (btn.dataset.range) {
          trendRange = parseInt(btn.dataset.range);
          render();
        }
      });
    });

    widget.querySelectorAll('.wpr-gas-metro-card').forEach(card => {
      card.addEventListener('click', () => {
        const name = card.dataset.metro;
        selectedMetro = selectedMetro === name ? null : name;
        render();
      });
    });

    const closeBtn = widget.querySelector('[data-action="close-detail"]');
    if (closeBtn) {
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedMetro = null;
        render();
      });
    }
  }

  // ── INIT ──
  async function init() {
    try {
      const resp = await fetch(DATA_URL);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
      usingFallback = false;
    } catch (err) {
      console.warn('Gas widget: live data unavailable, using fallback.', err.message);
      data = FALLBACK_DATA;
      usingFallback = true;
    }
    render();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
