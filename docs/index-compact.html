<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisconsin Gas Prices — Wausau Pilot &amp; Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap');

  :root {
    --ink: #1a1a1a;
    --ink-mid: #444;
    --ink-light: #6b6b6b;
    --ink-faint: #999;
    --paper: #f9fafb;
    --paper-warm: #f0f5f4;
    --rule: #c8d8d5;
    --rule-light: #dfe9e7;
    --accent: #3e847a;
    --accent-light: #5ab8ad;
    --accent-pale: #e0f2ef;
    --accent-dark: #2d6259;
    --up: #c0392b;
    --down: #27864a;
    --neutral: #888;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .wpr-compact {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    max-width: 360px;
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
    line-height: 1.4;
  }

  /* Header */
  .wpr-c-header {
    background: var(--ink);
    color: #fff;
    padding: 14px 16px 12px;
    position: relative;
    text-align: center;
  }
  .wpr-c-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
  }
  .wpr-c-logo {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    margin: 0 auto 8px;
    display: block;
    border: 2px solid rgba(255,255,255,0.15);
  }
  .wpr-c-kicker {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 2px;
  }
  .wpr-c-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.15;
  }
  .wpr-c-date {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
    font-style: italic;
  }

  /* Hero price */
  .wpr-c-hero {
    text-align: center;
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--rule-light);
  }
  .wpr-c-hero-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-faint);
    margin-bottom: 2px;
  }
  .wpr-c-hero-price {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }
  .wpr-c-hero-change {
    font-size: 11px;
    font-weight: 600;
    margin-top: 3px;
  }
  .wpr-dollar { font-family: 'Source Sans 3', sans-serif; font-weight: inherit; }

  /* Fuel pills */
  .wpr-c-fuels {
    display: flex;
    gap: 4px;
    padding: 10px 10px 8px;
    justify-content: center;
  }
  .wpr-c-fuel-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid var(--rule);
    background: #fff;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .wpr-c-fuel-btn:hover { border-color: var(--accent); color: var(--accent); }
  .wpr-c-fuel-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Metro list */
  .wpr-c-metro-list { padding: 0 10px 6px; }
  .wpr-c-metro-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-bottom: 1px solid var(--rule-light);
    border-radius: 6px;
    margin: 2px 0;
    transition: background 0.12s;
  }
  .wpr-c-metro-row:hover { background: var(--paper-warm); }
  .wpr-c-metro-row:last-child { border-bottom: none; }
  .wpr-c-metro-row.highlight { background: var(--accent-pale); }
  .wpr-c-metro-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
  }
  .wpr-c-metro-right {
    text-align: right;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .wpr-c-metro-price {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
  }
  .wpr-c-metro-delta {
    font-size: 10px;
    font-weight: 600;
    min-width: 52px;
    text-align: right;
  }
  .up-color { color: var(--up); }
  .down-color { color: var(--down); }
  .flat-color { color: var(--neutral); }

  /* CTA link */
  .wpr-c-cta {
    display: block;
    text-align: center;
    padding: 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    border-top: 1px solid var(--rule-light);
    transition: background 0.12s;
  }
  .wpr-c-cta:hover { background: var(--accent-pale); }

  /* Footer */
  .wpr-c-footer {
    padding: 8px 12px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    color: var(--ink-faint);
    background: var(--paper-warm);
  }
  .wpr-c-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .wpr-c-footer a:hover { text-decoration: underline; }

  .wpr-c-loading {
    text-align: center;
    padding: 40px 12px;
    color: var(--ink-faint);
    font-size: 12px;
  }
</style>
</head>

  const PRIORITY_METROS = ['Wausau', 'Eau Claire', 'Green Bay', 'Appleton', 'Madison', 'Milwaukee-Waukesha'];

  let data = null;
  let activeFuel = 'regular';
  let usingFallback = false;
  const widget = document.getElementById('gasWidget');

  function fmt(p) {
    if (p == null) return '—';
    return '<span class="wpr-dollar">$</span>' + p.toFixed(3);
  }
  function delta(c, p) {
    if (c == null || p == null) return { text: '—', cls: 'flat-color' };
    const diff = c - p;
    const sign = diff > 0 ? '+' : '';
    const cls = diff > 0.001 ? 'up-color' : diff < -0.001 ? 'down-color' : 'flat-color';
    const arrow = diff > 0.001 ? '▲' : diff < -0.001 ? '▼' : '—';
    return { text: `${arrow} ${sign}${diff.toFixed(3)}`, cls };
  }
  function fuelLabel(k) {
    return { regular: 'Regular', mid_grade: 'Mid-Grade', premium: 'Premium', diesel: 'Diesel' }[k] || k;
  }

  function render() {
    if (!data) return;
    const sw = data.statewide;
    const price = sw.current_avg?.[activeFuel];
    const yest = sw.yesterday_avg?.[activeFuel];
    const d = delta(price, yest);
    const metros = data.metros || {};
    const priority = data.priority_metros || PRIORITY_METROS;

    // Show only priority metros
    const sorted = priority.filter(n => metros[n]);

    let fuelBtns = ['regular','mid_grade','premium','diesel'].map(f =>
      `<button class="wpr-c-fuel-btn ${activeFuel===f?'active':''}" data-fuel="${f}">${fuelLabel(f)}</button>`
    ).join('');

    let metroRows = sorted.map(name => {
      const m = metros[name];
      const mp = m.current_avg?.[activeFuel];
      const my = m.yesterday_avg?.[activeFuel];
      const md = delta(mp, my);
      const isWausau = name === 'Wausau';
      return `
        <div class="wpr-c-metro-row ${isWausau ? 'highlight' : ''}">
          <span class="wpr-c-metro-name">${name}</span>
          <div class="wpr-c-metro-right">
            <span class="wpr-c-metro-price">${fmt(mp)}</span>
            <span class="wpr-c-metro-delta ${md.cls}">${md.text}</span>
          </div>
        </div>`;
    }).join('');

    widget.innerHTML = `
      <div class="wpr-c-header">
        <img src="${WPR_LOGO}" alt="WPR" class="wpr-c-logo" />
        <div class="wpr-c-kicker">Fuel Watch</div>
        <div class="wpr-c-title">Wisconsin Gas Prices</div>
        <div class="wpr-c-date">Updated ${data.price_date}</div>
      </div>
      <div class="wpr-c-hero">
        <div class="wpr-c-hero-label">State Avg · ${fuelLabel(activeFuel)}</div>
        <div class="wpr-c-hero-price">${fmt(price)}</div>
        <div class="wpr-c-hero-change ${d.cls}">${d.text} vs yesterday</div>
      </div>
      <div class="wpr-c-fuels">${fuelBtns}</div>
      <div class="wpr-c-metro-list">${metroRows}</div>
      <a href="${FULL_PAGE_URL}" target="_blank" class="wpr-c-cta">View full dashboard & trends →</a>
      <div class="wpr-c-footer">
        <span>Data via <a href="https://gasprices.aaa.com/?state=WI" target="_blank">AAA</a>${usingFallback ? ' · <em style="color:var(--accent)">sample</em>' : ''}</span>
        <span>WPR</span>
      </div>
    `;

    widget.querySelectorAll('.wpr-c-fuel-btn').forEach(btn => {
      btn.addEventListener('click', () => { activeFuel = btn.dataset.fuel; render(); });
    });
  }

  async function init() {
    try {
      const resp = await fetch(DATA_URL);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
      usingFallback = false;
    } catch (err) {
      console.warn('Using fallback data:', err.message);
      data = FALLBACK_DATA;
      usingFallback = true;
    }
    render();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
